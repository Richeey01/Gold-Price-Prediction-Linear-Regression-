<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gold Price Predictor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background-color: #f4f6f8;
            color: #333;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
        }

        h2 {
            color: #34495e;
        }

        .metrics {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background-color: white;
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.1);
            flex: 1;
            text-align: center;
        }

        .form-section, .dataset-section {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.1);
        }

        input[type="number"], input[type="date"] {
            padding: 8px;
            width: 100%;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #2980b9;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        table, th, td {
            border: 1px solid #ddd;
        }

        th, td {
            padding: 8px;
            text-align: center;
        }

        th {
            background-color: #3498db;
            color: white;
        }

        img {
            display: block;
            margin: 0 auto 20px;
        }

        .prediction {
            font-size: 24px;
            font-weight: bold;
            color: #e74c3c;
            text-align: center;
        }

    </style>
</head>
<body>

<h1>Gold Price Predictor</h1>

<!-- Метрики модели -->
<div class="metrics">
    <div class="card">
        <h3>Accuracy (R²)</h3>
        <p>{{ r2 }}</p>
    </div>
    <div class="card">
        <h3>MSE</h3>
        <p>{{ mse }}</p>
    </div>
    <div class="card">
        <h3>Total Rows</h3>
        <p>{{ total_rows }}</p>
    </div>
    <div class="card">
        <h3>Total Columns</h3>
        <p>{{ total_columns }}</p>
    </div>
</div>

<!-- График модели -->
<h2>Model Graph</h2>
<img src="{{ url_for('static', filename='graph.png') }}" width="600">

<!-- Форма предсказания -->
<div class="form-section">
    <h2>Predict Gold Price</h2>
    <form method="post">
        <label>Date:</label>
        <input type="date" name="date" required>

        <label>Interest Rate:</label>
        <input type="number" step="any" name="interest" required>

        <label>USD Index:</label>
        <input type="number" step="any" name="usd" required>

        <button type="submit">Predict</button>
    </form>

    {% if prediction %}
        <div class="prediction">
            Predicted Gold Price: {{ prediction }}
        </div>
    {% endif %}
</div>

<!-- Пример данных -->
<div class="dataset-section">
    <h2>Sample Data (10 rows)</h2>
    {{ sample_data | safe }}
</div>

</body>
</html>
